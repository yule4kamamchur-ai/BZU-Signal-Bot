name: BZU Signal Bot - Every 15 Minutes
on:
  schedule:
    - cron: '*/15 * * * *'

  workflow_dispatch:

jobs:
  signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          ```yaml
pip install requests beautifulsoup4
```

      
      - name: Fix news_count key
        run: |
          echo "=== BEFORE ==="
          grep -n "news_count\|total_news" bot_oneshot.py
          sed -i 's/"news_count": 0/"total_news": 0/g' bot_oneshot.py
          echo "=== AFTER ==="
          grep -n "news_count\|total_news" bot_oneshot.py
      
      - name: Run BZU Signal Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          BALANCE: ${{ secrets.BALANCE }}
          LEVERAGE: ${{ secrets.LEVERAGE }}
        run: python bot_oneshot.py
      
      - name: Log completion
        if: always()
        run: echo "Bot run completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

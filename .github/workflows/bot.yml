name: BZU Signal Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal bot
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          BALANCE: ${{ secrets.BALANCE }}
          LEVERAGE: ${{ secrets.LEVERAGE }}
        run: python bot_oneshot.py

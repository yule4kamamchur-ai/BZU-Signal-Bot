name: BZU Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Create memory files if missing
        run: |
          if [ ! -f last_signal_v6_2.json ]; then
            echo '{"version":"pro-hybrid-confluence-v6.2","active_trade":null,"history":[]}' > last_signal_v6_2.json
          fi
          if [ ! -f signal_journal_v6_2.json ]; then
            echo '{"version":"pro-hybrid-confluence-v6.2","signals":[],"trades":[]}' > signal_journal_v6_2.json
          fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_oneshot.py

      - name: Save memory files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_signal_v6_2.json signal_journal_v6_2.json
          git diff --cached --quiet || git commit -m "Update memory"
          git push origin main || echo "Push done or skipped"

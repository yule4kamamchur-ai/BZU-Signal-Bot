name: BZU Hybrid Signal Bot v6.2

on:
  schedule:
    - cron: '*/15 * * * *'   # Кожні 15 хвилин
  workflow_dispatch:         # Можна запустити вручну

permissions:
  contents: write

concurrency:
  group: bzu-signal-memory-v6-2
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run BZU Hybrid v6.2 Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python BZU_Pro_Hybrid_v6_2.py

      - name: Save signal memory and journal (v6.2)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase origin main || true

          # Додаємо файли нової версії v6.2
          git add last_signal_v6_2.json signal_journal_v6_2.json last_signal_v6_2.json.bak signal_journal_v6_2.json.bak 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No memory changes to commit"
          else
            git commit -m "Update BZU Hybrid v6.2 signal memory and journal"
            git push origin HEAD:main || git push origin HEAD:master
            echo "Memory files saved successfully"
          fi

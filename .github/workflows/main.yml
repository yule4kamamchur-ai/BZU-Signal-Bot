name: BZU Auto Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bzu-signal-memory
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Sync latest state before run
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOURNAL_PERSISTENCE_CONFIRMED: "true"
          SIGNAL_MEMORY_FILE: last_signal_v6_4.json
          SIGNAL_JOURNAL_FILE: signal_journal_v6_4.json
          PRECONFIRM_JOURNAL_FILE: preconfirmation_journal_v9_4.json
          PRECONFIRMATION_LAYER_ENABLED: "true"
  PRECONFIRM_EXPIRED_LABEL_MODE: "NEGATIVE"
        run: python bot_oneshot.py

      - name: Save signal memory and journal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git rm --cached -q last_signal_v6_4.json.bak signal_journal_v6_4.json.bak 2>/dev/null || true

          for file in last_signal_v6_4.json signal_journal_v6_4.json preconfirmation_journal_v9_4.json; do
            if [ -f "$file" ]; then
              git add "$file"
            else
              echo "Skip missing $file"
            fi
          done

          if git diff --cached --quiet; then
            echo "No memory/journal changes to commit."
            exit 0
          fi

          git commit -m "Update signal memory, journal and preconfirmation ledger [skip ci]"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed successfully."
              break
            fi
            echo "Push rejected, resyncing with latest main (attempt $i)..."
            git fetch origin main
            git reset --soft origin/main
            for file in last_signal_v6_4.json signal_journal_v6_4.json preconfirmation_journal_v9_4.json; do
              if [ -f "$file" ]; then
                git add "$file"
              fi
            done
            if git diff --cached --quiet; then
              echo "State already up to date on remote, nothing left to commit."
              exit 0
            fi
            git commit -m "Update signal memory, journal and preconfirmation ledger [skip ci]"
            sleep 3
          done

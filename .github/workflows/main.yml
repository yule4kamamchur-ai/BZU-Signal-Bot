name: BZU Auto Bot

'on':
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bzu-signal-memory
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_oneshot.py

      - name: Save signal memory and journal
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main || true
          git add last_signal_v5_1.json signal_journal_v5_1.json last_signal_v5_1.json.bak signal_journal_v5_1.json.bak || true
          git diff --cached --quiet && echo "No memory changes" || git commit -m "Update signal memory and journal v5.1"
          git push origin HEAD:main || echo "Push failed or nothing to push"

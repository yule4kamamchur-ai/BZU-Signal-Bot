name: BZU Signal Bot - Every 15 Minutes

on:
  schedule:
    - cron: '*/15 * * * *'  # Кожні 15 хвилин UTC
  workflow_dispatch:  # Ручне запущення з кнопки

jobs:
  signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run BZU Signal Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          BALANCE: ${{ secrets.BALANCE }}
          LEVERAGE: ${{ secrets.LEVERAGE }}
        run: python bot_oneshot.py
      
      - name: Log completion
        if: always()
        run: echo "Bot run completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
